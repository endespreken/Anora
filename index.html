<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://snixuzaslqdnbduqmazs.supabase.co/storage/v1/object/public/Asset/Logo%20Apps%20Mobile.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anora Chat</title>
    <style>
      body {
        margin: 0;
        background-color: #09090b; /* Default dark */
      }
      html.light body {
        background-color: #f3f4f6; /* Fallback light */
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
